name: Build Windows Desktop EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        working-directory: server_fastapi
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r desktop_requirements.txt
          cp .env.example .env

      - name: Build desktop package
        working-directory: server_fastapi
        run: pyinstaller --noconfirm --clean desktop_app.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SKBagsDesktop-windows
          path: server_fastapi/dist/SKBagsDesktop.exe
